<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Taata Owen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-wrapper {
            max-width: 500px;
            margin: 150px auto 50px;
            padding: 40px 20px;
            text-align: center;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .success-icon {
            font-size: 4.5rem;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .success-wrapper h1 {
            color: var(--primary-color, #2c3e50);
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .success-wrapper p {
            color: #666;
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            background: var(--secondary-color, #ff6b00);
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background: #e05e00;
        }
    </style>
</head>
<body>
    <div class="success-wrapper">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h1>Order Received!</h1>
        <p>Thank you for shopping with us. Your delivery request has been sent straight to Taata Owen. Our rider will call you shortly!</p>
        <a href="services.html" class="btn-home">Continue Shopping</a>
    </div>
</body>
</html>
